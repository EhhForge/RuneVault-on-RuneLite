plugins {
    id 'java'
}

group = 'com.runevault'
version = '1.0.0'

def runeLiteVersion = 'latest.release'

repositories {
    maven {
        url = 'https://repo.runelite.net'
        content {
            includeGroupByRegex("net\\.runelite.*")
        }
    }
    mavenCentral()
}

dependencies {
    compileOnly group: 'net.runelite', name: 'client', version: runeLiteVersion
    compileOnly group: 'org.projectlombok', name: 'lombok', version: '1.18.30'
    annotationProcessor group: 'org.projectlombok', name: 'lombok', version: '1.18.30'
    compileOnly group: 'com.squareup.okhttp3', name: 'okhttp', version: '4.9.3'
    compileOnly group: 'com.google.code.gson', name: 'gson', version: '2.10.1'

    // testImplementation puts the client on the runtime classpath for the `run` task
    testImplementation group: 'net.runelite', name: 'client', version: runeLiteVersion

    testImplementation 'junit:junit:4.13.2'
}

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}


tasks.register('run', JavaExec) {
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'com.runevault.RuneVaultPluginTest'
    def jvmArgsList = ['-ea',
            '--add-opens=java.base/java.net=ALL-UNNAMED',
            '--add-opens=java.base/java.io=ALL-UNNAMED']
    // Mac-only: RuneLite uses Apple dock APIs not present on other platforms
    if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
        jvmArgsList += '--add-opens=java.desktop/com.apple.eawt=ALL-UNNAMED'
    }
    jvmArgs jvmArgsList
    args '--developer-mode'
}
